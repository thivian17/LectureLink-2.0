# LectureLink V2 — Production Deployment to Google Cloud Run
#
# Trigger: push to main branch, or manual dispatch.
#
# Job chain (optimized for speed):
#   lint-and-test ──→ build-and-push-api ──→ deploy-api    ──→ notify
#                  ├→ build-and-push-web ──→ deploy-web    ──↗
#                  └→ (api image ready)  ──→ deploy-workers ─↗
#
# Required GitHub Secrets:
#   GCP_PROJECT_ID              — Google Cloud project ID
#   WIF_PROVIDER                — Workload Identity Federation provider resource name
#   WIF_SERVICE_ACCOUNT         — Deploy service account email
#   RUNTIME_SERVICE_ACCOUNT     — Cloud Run runtime service account email
#   NEXT_PUBLIC_SUPABASE_URL    — Supabase project URL (frontend build-time)
#   NEXT_PUBLIC_SUPABASE_ANON_KEY — Supabase anon key (frontend build-time)
#   NEXT_PUBLIC_API_URL         — Production API URL (https://api.lecturelink.ca)
#   MEMORYSTORE_IP              — Cloud Memorystore Redis IP

name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: us-central1-docker.pkg.dev
  REGION: us-central1
  API_SERVICE: lecturelink-api-prod
  WEB_SERVICE: lecturelink-web-prod
  WORKER_FAST_SERVICE: lecturelink-worker-fast-prod
  WORKER_SLOW_SERVICE: lecturelink-worker-slow-prod
  VPC_CONNECTOR: lecturelink-connector

permissions:
  contents: read
  id-token: write

# ---------------------------------------------------------------------------
# Job 1: Lint & Test (backend + frontend in parallel)
# ---------------------------------------------------------------------------
jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # -- Python / Backend --
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v4

      # -- Node / Frontend (setup in parallel with backend install) --
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/web/package-lock.json

      # Install backend + frontend deps in parallel
      - name: Install dependencies
        run: |
          uv sync --frozen --project packages/api &
          npm ci --prefix packages/web &
          wait

      # Run lint + test + typecheck in parallel
      - name: Lint, test, typecheck
        run: |
          uvx ruff check packages/api/src/ packages/api/tests/ --config packages/api/pyproject.toml &
          RUFF_PID=$!
          uv run pytest packages/api/tests/ -v --tb=short -q --ignore=packages/api/tests/integration &
          PYTEST_PID=$!
          npx tsc --noEmit --project packages/web/tsconfig.json &
          TSC_PID=$!
          # Removed Next.js build — it runs again in the Docker build.
          # tsc --noEmit catches type errors; the Docker build catches build errors.
          wait $RUFF_PID $PYTEST_PID $TSC_PID
        env:
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_ANON_KEY: placeholder-anon-key

  # ---------------------------------------------------------------------------
  # Job 2a: Build & Push API image (with Docker layer cache)
  # ---------------------------------------------------------------------------
  build-and-push-api:
    name: Build & Push API
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - uses: docker/setup-buildx-action@v3

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/lecturelink/api:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/lecturelink/api:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

  # ---------------------------------------------------------------------------
  # Job 2b: Build & Push Web image (parallel with API, with Docker layer cache)
  # ---------------------------------------------------------------------------
  build-and-push-web:
    name: Build & Push Web
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - uses: docker/setup-buildx-action@v3

      - name: Build & push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/web/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/lecturelink/web:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/lecturelink/web:latest
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  # ---------------------------------------------------------------------------
  # Job 3a: Deploy API to Cloud Run
  # ---------------------------------------------------------------------------
  deploy-api:
    name: Deploy API
    needs: build-and-push-api
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy API (no traffic)
        run: >-
          gcloud run deploy ${{ env.API_SERVICE }}
          --image ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/lecturelink/api:${{ github.sha }}
          --region ${{ env.REGION }}
          --platform managed
          --memory 512Mi
          --cpu 1
          --min-instances 1
          --max-instances 10
          --timeout 60s
          --vpc-connector=${{ env.VPC_CONNECTOR }}
          --service-account=${{ secrets.RUNTIME_SERVICE_ACCOUNT }}
          --set-secrets="SUPABASE_URL=SUPABASE_URL:latest,SUPABASE_ANON_KEY=SUPABASE_ANON_KEY:latest,SUPABASE_SERVICE_KEY=SUPABASE_SERVICE_ROLE_KEY:latest,INTERNAL_API_KEY=INTERNAL_API_KEY:latest"
          --set-env-vars="ENVIRONMENT=production,GOOGLE_CLOUD_PROJECT=${{ secrets.GCP_PROJECT_ID }},REDIS_URL=redis://${{ secrets.MEMORYSTORE_IP }}:6379,CORS_ORIGINS=https://lecturelink.ca,GOOGLE_GENAI_USE_VERTEXAI=TRUE"
          --no-traffic
          --tag canary
          --allow-unauthenticated

      - name: Smoke test API
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.API_SERVICE }} --region=${{ env.REGION }} --format='value(status.url)')
          CANARY_URL=$(echo "$SERVICE_URL" | sed 's|https://|https://canary---|')
          echo "Testing canary: $CANARY_URL"

          STATUS=$(curl -s -o /dev/null -w '%{http_code}' "${CANARY_URL}/health" --max-time 30)
          echo "Health check returned: $STATUS"

          if [ "$STATUS" -ne 200 ]; then
            echo "::error::Smoke test failed — /health returned $STATUS"
            exit 1
          fi

      - name: Shift traffic to new revision
        run: |
          gcloud run services update-traffic ${{ env.API_SERVICE }} \
            --to-latest \
            --remove-tags=canary \
            --region ${{ env.REGION }}

  # ---------------------------------------------------------------------------
  # Job 3b: Deploy Workers (no dependency on deploy-api — just needs the image)
  # ---------------------------------------------------------------------------
  deploy-worker:
    name: Deploy Workers
    needs: build-and-push-api
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # Deploy both workers in parallel within one step
      - name: Deploy Fast + Slow Workers
        run: |
          gcloud run deploy ${{ env.WORKER_FAST_SERVICE }} \
            --image ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/lecturelink/api:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --command="python","-m","lecturelink_api.worker_main","--queue","fast" \
            --memory 1Gi \
            --cpu 1 \
            --min-instances 1 \
            --max-instances 3 \
            --no-cpu-throttling \
            --vpc-connector=${{ env.VPC_CONNECTOR }} \
            --service-account=${{ secrets.RUNTIME_SERVICE_ACCOUNT }} \
            --set-secrets="SUPABASE_URL=SUPABASE_URL:latest,SUPABASE_ANON_KEY=SUPABASE_ANON_KEY:latest,SUPABASE_SERVICE_KEY=SUPABASE_SERVICE_ROLE_KEY:latest" \
            --set-env-vars="ENVIRONMENT=production,GOOGLE_CLOUD_PROJECT=${{ secrets.GCP_PROJECT_ID }},REDIS_URL=redis://${{ secrets.MEMORYSTORE_IP }}:6379,GOOGLE_GENAI_USE_VERTEXAI=TRUE,WORKER_QUEUE=fast" \
            --no-allow-unauthenticated &
          FAST_PID=$!

          gcloud run deploy ${{ env.WORKER_SLOW_SERVICE }} \
            --image ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/lecturelink/api:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --command="python","-m","lecturelink_api.worker_main","--queue","slow" \
            --memory 1Gi \
            --cpu 1 \
            --min-instances 1 \
            --max-instances 5 \
            --no-cpu-throttling \
            --vpc-connector=${{ env.VPC_CONNECTOR }} \
            --service-account=${{ secrets.RUNTIME_SERVICE_ACCOUNT }} \
            --set-secrets="SUPABASE_URL=SUPABASE_URL:latest,SUPABASE_ANON_KEY=SUPABASE_ANON_KEY:latest,SUPABASE_SERVICE_KEY=SUPABASE_SERVICE_ROLE_KEY:latest" \
            --set-env-vars="ENVIRONMENT=production,GOOGLE_CLOUD_PROJECT=${{ secrets.GCP_PROJECT_ID }},REDIS_URL=redis://${{ secrets.MEMORYSTORE_IP }}:6379,GOOGLE_GENAI_USE_VERTEXAI=TRUE,WORKER_QUEUE=slow" \
            --no-allow-unauthenticated &
          SLOW_PID=$!

          wait $FAST_PID $SLOW_PID

  # ---------------------------------------------------------------------------
  # Job 3c: Deploy Web to Cloud Run
  # ---------------------------------------------------------------------------
  deploy-web:
    name: Deploy Web
    needs: build-and-push-web
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Web (no traffic)
        run: >-
          gcloud run deploy ${{ env.WEB_SERVICE }}
          --image ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/lecturelink/web:${{ github.sha }}
          --region ${{ env.REGION }}
          --platform managed
          --memory 256Mi
          --cpu 1
          --min-instances 1
          --max-instances 5
          --timeout 30s
          --service-account=${{ secrets.RUNTIME_SERVICE_ACCOUNT }}
          --set-env-vars="NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}"
          --no-traffic
          --tag canary
          --allow-unauthenticated

      - name: Smoke test Web
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.WEB_SERVICE }} --region=${{ env.REGION }} --format='value(status.url)')
          CANARY_URL=$(echo "$SERVICE_URL" | sed 's|https://|https://canary---|')
          echo "Testing canary: $CANARY_URL"

          STATUS=$(curl -s -o /dev/null -w '%{http_code}' "${CANARY_URL}" --max-time 30)
          echo "Root page returned: $STATUS"

          if [ "$STATUS" -ne 200 ]; then
            echo "::error::Smoke test failed — root returned $STATUS"
            exit 1
          fi

      - name: Shift traffic to new revision
        run: |
          gcloud run services update-traffic ${{ env.WEB_SERVICE }} \
            --to-latest \
            --remove-tags=canary \
            --region ${{ env.REGION }}

  # ---------------------------------------------------------------------------
  # Job 4: Notify
  # ---------------------------------------------------------------------------
  notify:
    name: Notify
    needs: [deploy-api, deploy-worker, deploy-web]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Deployment result
        run: |
          if [ "${{ needs.deploy-api.result }}" = "success" ] && \
             [ "${{ needs.deploy-worker.result }}" = "success" ] && \
             [ "${{ needs.deploy-web.result }}" = "success" ]; then
            echo "SUCCESS: Deployed ${{ github.sha }} to production"
            echo "  API:    https://api.lecturelink.ca"
            echo "  Web:    https://lecturelink.ca"
            echo "  Worker: running"
          else
            echo "FAILED: Deploy failed for ${{ github.sha }}"
            echo "  API:    ${{ needs.deploy-api.result }}"
            echo "  Worker: ${{ needs.deploy-worker.result }}"
            echo "  Web:    ${{ needs.deploy-web.result }}"
            exit 1
          fi
