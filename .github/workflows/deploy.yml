# LectureLink V2 — Continuous Deployment to Google Cloud Run
#
# Trigger: push to main branch only.
#
# Job chain:
#   lint-and-test → build-and-push-api ──→ deploy-api ──→ notify
#                 → build-and-push-web ──→ deploy-web ──↗
#
# Required GitHub Secrets:
#   GCP_PROJECT_ID          — Google Cloud project ID (e.g. "lecturelink-prod")
#   WIF_PROVIDER            — Workload Identity Federation provider resource name
#   WIF_SERVICE_ACCOUNT     — Service account email for WIF (e.g. github-deployer@<project>.iam.gserviceaccount.com)
#   NEXT_PUBLIC_SUPABASE_URL    — Supabase project URL (for frontend build-time env)
#   NEXT_PUBLIC_SUPABASE_ANON_KEY — Supabase anon key (for frontend build-time env)
#   NEXT_PUBLIC_API_URL     — Backend Cloud Run URL (for frontend build-time env)

name: Deploy to Cloud Run

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: us-central1-docker.pkg.dev
  REGION: us-central1

permissions:
  contents: read
  id-token: write

# ---------------------------------------------------------------------------
# Job 1: Lint & Test
# ---------------------------------------------------------------------------
jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # -- Python / Backend --
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v4

      - name: Install backend dependencies
        run: uv sync --frozen --project packages/api

      - name: Ruff lint
        run: uv run ruff check packages/api/src/ packages/api/tests/

      - name: Pytest
        run: uv run pytest packages/api/tests/ -v --tb=short --ignore=packages/api/tests/integration
        env:
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_ANON_KEY: placeholder-anon-key

      # -- Node / Frontend --
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: packages/web

      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: packages/web

      - name: Next.js build check
        run: npm run build
        working-directory: packages/web
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key

  # ---------------------------------------------------------------------------
  # Job 2a: Build & Push API image
  # ---------------------------------------------------------------------------
  build-and-push-api:
    name: Build & Push API
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build API image
        run: |
          docker build \
            -f packages/api/Dockerfile \
            -t ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/lecturelink/api:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/lecturelink/api:latest \
            .

      - name: Push API image
        run: |
          docker push ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/lecturelink/api:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/lecturelink/api:latest

  # ---------------------------------------------------------------------------
  # Job 2b: Build & Push Web image (parallel with API)
  # ---------------------------------------------------------------------------
  build-and-push-web:
    name: Build & Push Web
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      # NOTE: The web Dockerfile needs these ARG declarations in the builder stage
      # for the build-args to take effect:
      #   ARG NEXT_PUBLIC_SUPABASE_URL
      #   ARG NEXT_PUBLIC_SUPABASE_ANON_KEY
      #   ARG NEXT_PUBLIC_API_URL
      #   ENV NEXT_PUBLIC_SUPABASE_URL=$NEXT_PUBLIC_SUPABASE_URL
      #   ENV NEXT_PUBLIC_SUPABASE_ANON_KEY=$NEXT_PUBLIC_SUPABASE_ANON_KEY
      #   ENV NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL
      - name: Build Web image
        run: |
          docker build \
            -f packages/web/Dockerfile \
            -t ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/lecturelink/web:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/lecturelink/web:latest \
            --build-arg NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }} \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }} \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }} \
            .

      - name: Push Web image
        run: |
          docker push ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/lecturelink/web:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/lecturelink/web:latest

  # ---------------------------------------------------------------------------
  # Job 3a: Deploy API to Cloud Run
  # ---------------------------------------------------------------------------
  deploy-api:
    name: Deploy API
    needs: build-and-push-api
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy API (no traffic)
        run: |
          gcloud run deploy lecturelink-api \
            --image ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/lecturelink/api:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 1 \
            --max-instances 10 \
            --timeout 60s \
            --set-secrets="SUPABASE_URL=SUPABASE_URL:latest,SUPABASE_ANON_KEY=SUPABASE_ANON_KEY:latest,SUPABASE_SERVICE_KEY=SUPABASE_SERVICE_ROLE_KEY:latest,GOOGLE_API_KEY=GEMINI_API_KEY:latest,INTERNAL_API_KEY=INTERNAL_API_KEY:latest" \
            --set-env-vars="ENVIRONMENT=production,GOOGLE_CLOUD_PROJECT=${{ secrets.GCP_PROJECT_ID }}" \
            --no-traffic \
            --allow-unauthenticated

      - name: Smoke test API
        run: |
          REVISION_URL=$(gcloud run revisions list \
            --service=lecturelink-api \
            --region=${{ env.REGION }} \
            --sort-by=~creationTimestamp \
            --limit=1 \
            --format='value(status.url)')
          echo "Testing revision: $REVISION_URL"

          STATUS=$(curl -s -o /dev/null -w '%{http_code}' "${REVISION_URL}/health" --max-time 30)
          echo "Health check returned: $STATUS"

          if [ "$STATUS" -ne 200 ]; then
            echo "::error::Smoke test failed — /health returned $STATUS"
            exit 1
          fi

      - name: Shift traffic to new revision
        run: |
          gcloud run services update-traffic lecturelink-api \
            --to-latest \
            --region ${{ env.REGION }}

  # ---------------------------------------------------------------------------
  # Job 3b: Deploy Web to Cloud Run
  # ---------------------------------------------------------------------------
  deploy-web:
    name: Deploy Web
    needs: build-and-push-web
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get API service URL
        id: api-url
        run: |
          API_URL=$(gcloud run services describe lecturelink-api \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "url=$API_URL" >> "$GITHUB_OUTPUT"

      - name: Deploy Web (no traffic)
        run: |
          gcloud run deploy lecturelink-web \
            --image ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/lecturelink/web:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --memory 256Mi \
            --cpu 1 \
            --min-instances 1 \
            --max-instances 5 \
            --timeout 30s \
            --set-env-vars="NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }},NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }},NEXT_PUBLIC_API_URL=${{ steps.api-url.outputs.url }}" \
            --no-traffic \
            --allow-unauthenticated

      - name: Smoke test Web
        run: |
          REVISION_URL=$(gcloud run revisions list \
            --service=lecturelink-web \
            --region=${{ env.REGION }} \
            --sort-by=~creationTimestamp \
            --limit=1 \
            --format='value(status.url)')
          echo "Testing revision: $REVISION_URL"

          STATUS=$(curl -s -o /dev/null -w '%{http_code}' "${REVISION_URL}" --max-time 30)
          echo "Root page returned: $STATUS"

          if [ "$STATUS" -ne 200 ]; then
            echo "::error::Smoke test failed — root returned $STATUS"
            exit 1
          fi

      - name: Shift traffic to new revision
        run: |
          gcloud run services update-traffic lecturelink-web \
            --to-latest \
            --region ${{ env.REGION }}

  # ---------------------------------------------------------------------------
  # Job 4: Notify
  # ---------------------------------------------------------------------------
  notify:
    name: Notify
    needs: [deploy-api, deploy-web]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Deployment result
        run: |
          if [ "${{ needs.deploy-api.result }}" = "success" ] && [ "${{ needs.deploy-web.result }}" = "success" ]; then
            echo "SUCCESS: Deployed ${{ github.sha }} to production"
          else
            echo "FAILED: Deploy failed for ${{ github.sha }}"
            echo "  API:  ${{ needs.deploy-api.result }}"
            echo "  Web:  ${{ needs.deploy-web.result }}"
            exit 1
          fi
