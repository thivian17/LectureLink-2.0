# LectureLink V2 — Staging Deployment to Google Cloud Run
#
# Trigger: push to develop branch, or manual dispatch.
#
# Deploys to staging Cloud Run services with staging-specific config.
# Uses the same GCP project but different service names and secrets.
#
# Required GitHub Secrets (same as production, plus staging-specific):
#   GCP_PROJECT_ID              — Google Cloud project ID
#   WIF_PROVIDER                — Workload Identity Federation provider resource name
#   WIF_SERVICE_ACCOUNT         — Deploy service account email
#   RUNTIME_SERVICE_ACCOUNT     — Cloud Run runtime service account email
#   MEMORYSTORE_IP              — Cloud Memorystore Redis IP
#   STAGING_NEXT_PUBLIC_SUPABASE_URL      — Staging Supabase project URL
#   STAGING_NEXT_PUBLIC_SUPABASE_ANON_KEY — Staging Supabase anon key
#   STAGING_NEXT_PUBLIC_API_URL           — https://staging-api.lecturelink.ca

name: Deploy to Staging

on:
  push:
    branches: [develop]
  workflow_dispatch: {}

concurrency:
  group: deploy-staging
  cancel-in-progress: true

env:
  REGISTRY: us-central1-docker.pkg.dev
  REGION: us-central1
  API_SERVICE: lecturelink-api-staging
  WEB_SERVICE: lecturelink-web-staging
  WORKER_FAST_SERVICE: lecturelink-worker-fast-staging
  WORKER_SLOW_SERVICE: lecturelink-worker-slow-staging
  VPC_CONNECTOR: lecturelink-connector

permissions:
  contents: read
  id-token: write

# ---------------------------------------------------------------------------
# Job 1: Build & Push API image
# ---------------------------------------------------------------------------
jobs:
  build-and-push-api:
    name: Build & Push API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build API image
        run: |
          docker build \
            -f packages/api/Dockerfile \
            -t ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/lecturelink/api:staging-${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/lecturelink/api:staging-latest \
            .

      - name: Push API image
        run: |
          docker push ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/lecturelink/api:staging-${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/lecturelink/api:staging-latest

  # ---------------------------------------------------------------------------
  # Job 2: Build & Push Web image (parallel with API)
  # ---------------------------------------------------------------------------
  build-and-push-web:
    name: Build & Push Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build Web image
        run: |
          docker build \
            -f packages/web/Dockerfile \
            -t ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/lecturelink/web:staging-${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/lecturelink/web:staging-latest \
            --build-arg NEXT_PUBLIC_SUPABASE_URL=${{ secrets.STAGING_NEXT_PUBLIC_SUPABASE_URL }} \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.STAGING_NEXT_PUBLIC_SUPABASE_ANON_KEY }} \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.STAGING_NEXT_PUBLIC_API_URL }} \
            .

      - name: Push Web image
        run: |
          docker push ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/lecturelink/web:staging-${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/lecturelink/web:staging-latest

  # ---------------------------------------------------------------------------
  # Job 3a: Deploy API to Cloud Run
  # ---------------------------------------------------------------------------
  deploy-api:
    name: Deploy API
    needs: build-and-push-api
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy API
        run: |
          gcloud run deploy ${{ env.API_SERVICE }} \
            --image ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/lecturelink/api:staging-${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --memory 1Gi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 5 \
            --timeout 60s \
            --vpc-connector=${{ env.VPC_CONNECTOR }} \
            --service-account=${{ secrets.RUNTIME_SERVICE_ACCOUNT }} \
            --set-secrets="SUPABASE_URL=STAGING_SUPABASE_URL:latest,SUPABASE_ANON_KEY=STAGING_SUPABASE_ANON_KEY:latest,SUPABASE_SERVICE_KEY=STAGING_SUPABASE_SERVICE_ROLE_KEY:latest,GOOGLE_API_KEY=GEMINI_API_KEY:latest,INTERNAL_API_KEY=INTERNAL_API_KEY:latest" \
            --set-env-vars="ENVIRONMENT=staging,GOOGLE_CLOUD_PROJECT=${{ secrets.GCP_PROJECT_ID }},REDIS_URL=redis://${{ secrets.MEMORYSTORE_IP }}:6379,CORS_ORIGINS=https://staging.lecturelink.ca" \
            --allow-unauthenticated

  # ---------------------------------------------------------------------------
  # Job 3b: Deploy Workers to Cloud Run (fast + slow queues)
  # ---------------------------------------------------------------------------
  deploy-worker:
    name: Deploy Workers
    needs: [build-and-push-api, deploy-api]
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Fast Worker (syllabus, notifications)
        run: |
          gcloud run deploy ${{ env.WORKER_FAST_SERVICE }} \
            --image ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/lecturelink/api:staging-${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --command="python","-m","lecturelink_api.worker_main","--queue","fast" \
            --memory 2Gi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 3 \
            --no-cpu-throttling \
            --vpc-connector=${{ env.VPC_CONNECTOR }} \
            --service-account=${{ secrets.RUNTIME_SERVICE_ACCOUNT }} \
            --set-secrets="SUPABASE_URL=STAGING_SUPABASE_URL:latest,SUPABASE_ANON_KEY=STAGING_SUPABASE_ANON_KEY:latest,SUPABASE_SERVICE_KEY=STAGING_SUPABASE_SERVICE_ROLE_KEY:latest,GOOGLE_API_KEY=GEMINI_API_KEY:latest" \
            --set-env-vars="ENVIRONMENT=staging,GOOGLE_CLOUD_PROJECT=${{ secrets.GCP_PROJECT_ID }},REDIS_URL=redis://${{ secrets.MEMORYSTORE_IP }}:6379,WORKER_QUEUE=fast" \
            --no-allow-unauthenticated

      - name: Deploy Slow Worker (lectures, quizzes, materials)
        run: |
          gcloud run deploy ${{ env.WORKER_SLOW_SERVICE }} \
            --image ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/lecturelink/api:staging-${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --command="python","-m","lecturelink_api.worker_main","--queue","slow" \
            --memory 4Gi \
            --cpu 8 \
            --min-instances 0 \
            --max-instances 5 \
            --no-cpu-throttling \
            --vpc-connector=${{ env.VPC_CONNECTOR }} \
            --service-account=${{ secrets.RUNTIME_SERVICE_ACCOUNT }} \
            --set-secrets="SUPABASE_URL=STAGING_SUPABASE_URL:latest,SUPABASE_ANON_KEY=STAGING_SUPABASE_ANON_KEY:latest,SUPABASE_SERVICE_KEY=STAGING_SUPABASE_SERVICE_ROLE_KEY:latest,GOOGLE_API_KEY=GEMINI_API_KEY:latest" \
            --set-env-vars="ENVIRONMENT=staging,GOOGLE_CLOUD_PROJECT=${{ secrets.GCP_PROJECT_ID }},REDIS_URL=redis://${{ secrets.MEMORYSTORE_IP }}:6379,WORKER_QUEUE=slow" \
            --no-allow-unauthenticated

  # ---------------------------------------------------------------------------
  # Job 3c: Deploy Web to Cloud Run
  # ---------------------------------------------------------------------------
  deploy-web:
    name: Deploy Web
    needs: build-and-push-web
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Web
        run: |
          gcloud run deploy ${{ env.WEB_SERVICE }} \
            --image ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/lecturelink/web:staging-${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 3 \
            --timeout 30s \
            --service-account=${{ secrets.RUNTIME_SERVICE_ACCOUNT }} \
            --set-env-vars="NEXT_PUBLIC_API_URL=${{ secrets.STAGING_NEXT_PUBLIC_API_URL }}" \
            --allow-unauthenticated

  # ---------------------------------------------------------------------------
  # Job 4: Notify
  # ---------------------------------------------------------------------------
  notify:
    name: Notify
    needs: [deploy-api, deploy-worker, deploy-web]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Deployment result
        run: |
          if [ "${{ needs.deploy-api.result }}" = "success" ] && \
             [ "${{ needs.deploy-worker.result }}" = "success" ] && \
             [ "${{ needs.deploy-web.result }}" = "success" ]; then
            echo "SUCCESS: Deployed ${{ github.sha }} to staging"
            echo "  API:    https://staging-api.lecturelink.ca"
            echo "  Web:    https://staging.lecturelink.ca"
            echo "  Worker: running"
          else
            echo "FAILED: Staging deploy failed for ${{ github.sha }}"
            echo "  API:    ${{ needs.deploy-api.result }}"
            echo "  Worker: ${{ needs.deploy-worker.result }}"
            echo "  Web:    ${{ needs.deploy-web.result }}"
            exit 1
          fi
